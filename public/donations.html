<!DOCTYPE html>
<!--
     Inventario Solidario
     Projeto academico - CTESP Redes e Seguranca Informatica - IPCA
     Equipa: JDJB  (J-Jorge, D-Jose Daniel, J-Joao, B-Barreto)
-->
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doações - Inventário Solidário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="topbar">
        <h2 id="page-title"></h2>
        <div class="user-chip" id="user-chip"></div>
      </div>

      <div class="card" id="card-nova" style="display:none">
        <h3>Submeter nova doação</h3>
        <p style="font-size:.85rem;color:var(--cinza);margin-bottom:8px">Indique os bens que pretende doar. A associação irá validar a doação.</p>
        <div class="flex">
          <div><label>Data de entrega prevista</label><input id="d-date" type="date"></div>
          <div><label>Armazém de destino (opcional)</label><select id="d-warehouse"></select></div>
          <div style="flex:2"><label>Observações</label><input id="d-notes" placeholder="Ex.: campanha de Natal"></div>
        </div>
        <div id="itens"></div>
        <div class="btn-row">
          <button class="btn gray sm" onclick="addItem()">+ Adicionar bem</button>
        </div>
        <div class="btn-row">
          <button class="btn" onclick="submeter()">Submeter doação</button>
        </div>
        <p id="err-nova" class="error"></p>
      </div>

      <div class="card" id="card-filtros" style="display:none">
        <h3>Filtrar doações</h3>
        <div class="flex">
          <div><label>Estado</label>
            <select id="f-estado" onchange="aplicarFiltros()">
              <option value="ativos">Ativos (por tratar)</option>
              <option value="">Todos</option>
              <option value="pending">Pendente</option>
              <option value="validated">Validada</option>
              <option value="received">Rececionada</option>
              <option value="rejected">Rejeitada</option>
              <option value="cancelled">Cancelada</option>
            </select>
          </div>
          <div><label>De (data)</label><input id="f-de" type="date" onchange="aplicarFiltros()"></div>
          <div><label>Até (data)</label><input id="f-ate" type="date" onchange="aplicarFiltros()"></div>
          <div style="flex:0;display:flex;align-items:flex-end"><button class="btn gray" onclick="limparFiltros()">Limpar</button></div>
        </div>
      </div>

      <div class="card">
        <h3>Doações registadas</h3>
        <div id="tabela-doacoes"></div>
        <p id="err" class="error"></p>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3 id="m-codigo"></h3>
      <p class="sub" id="m-info"></p>
      <table>
        <thead><tr><th>Artigo</th><th>Quantidade</th><th>Validade</th><th>Estado do bem</th></tr></thead>
        <tbody id="m-itens"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn" onclick="imprimirDetalhe()">Imprimir</button>
        <button class="btn gray" onclick="fecharDetalhe()">Fechar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/tabela.js"></script>
  <script src="js/seletor.js"></script>
  <script src="js/donations.js"></script>
</body>
</html>
