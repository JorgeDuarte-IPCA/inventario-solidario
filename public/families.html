<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famílias - Inventário Solidário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="topbar">
        <h2 id="page-title"></h2>
        <div class="user-chip" id="user-chip"></div>
      </div>

      <div class="card">
        <h3>Nova família de produtos</h3>
        <div class="flex">
          <div><label>Nome da família</label><input id="f-name" placeholder="Ex.: Material escolar"></div>
          <div style="flex:0"><button class="btn" onclick="criar()">Adicionar</button></div>
        </div>
        <p id="err" class="error"></p>
      </div>

      <div class="card">
        <h3>Famílias existentes</h3>
        <table>
          <thead><tr><th>Nome</th><th>Produtos</th><th>Ações</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/families.js"></script>
</body>
</html>
