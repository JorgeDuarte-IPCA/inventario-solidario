<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artigos por estado - Inventário Solidário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main">
      <div class="topbar">
        <h2 id="page-title"></h2>
        <div class="user-chip" id="user-chip"></div>
      </div>

      <div class="card">
        <h3 id="titulo-estado">Artigos por estado</h3>
        <p id="sub" style="font-size:.85rem;color:var(--cinza)">A carregar...</p>
        <div id="tabela-estado"></div>
        <p id="err" class="error"></p>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
  <script src="js/tabela.js"></script>
  <script>
    (function () {
    try {
      renderShell('products.html', 'Artigos por estado');
    } catch (e) {
      console.error('renderShell falhou:', e);
    }

    const VALIDADE_PT = { green: 'Válido', yellow: 'Atenção', red: 'A expirar', expired: 'Fora de validade' };
    const VALIDADE_CL = { green: 'green', yellow: 'yellow', red: 'red', expired: 'dark' };
    const COND_PT = { new: 'Novo', good: 'Bom estado', used: 'Gasto', with_defect: 'Com defeito', to_repair: 'Para arranjar' };
    const COND_CL = { new: 'green', good: 'green', used: 'yellow', with_defect: 'orange', to_repair: 'red' };

    // Ler tipo (validade|condicao) e estado do URL
    const params = new URLSearchParams(location.search);
    const tipo = params.get('tipo') || 'validade';
    const estado = params.get('estado') || '';

    function txt(id, valor) { const el = document.getElementById(id); if (el) el.textContent = valor; }
    function htm(id, valor) { const el = document.getElementById(id); if (el) el.innerHTML = valor; }

    async function carregar() {
      try {
        const filtro = tipo === 'condicao' ? ('condition=' + encodeURIComponent(estado))
                                            : ('color=' + encodeURIComponent(estado));
        const produtos = await api('/api/products?' + filtro);

        const nomeEstado = tipo === 'condicao' ? (COND_PT[estado] || estado) : (VALIDADE_PT[estado] || estado);
        const classe = tipo === 'condicao' ? (COND_CL[estado] || 'gray') : (VALIDADE_CL[estado] || 'gray');
        htm('titulo-estado', `Artigos no estado: <span class="badge ${classe}">${nomeEstado}</span>`);

        const linhas = (produtos || []).map(p => ({
          name: p.name,
          family_name: p.family_name || '-',
          warehouse_name: p.warehouse_name || '— (sem armazém)',
          warehouse_district: p.warehouse_district || '-',
          size: p.size || '-',
          quantity: Number(p.quantity) || 0
        }));

        const total = linhas.reduce((s, r) => s + r.quantity, 0);
        const base = tipo === 'condicao'
          ? 'Artigos de vestuário/casa neste estado de conservação, com a quantidade em cada armazém.'
          : 'Artigos neste estado de validade, com a quantidade em cada armazém.';
        txt('sub', `${base}  Total: ${total} unidade(s) em ${linhas.length} registo(s).`);

        const tabela = criarTabela({
          container: document.getElementById('tabela-estado'),
          colunas: [
            { titulo: 'Artigo', campo: 'name', render: r =>
              `<a href="artigo.html?nome=${encodeURIComponent(r.name)}" style="color:var(--verde);font-weight:600;text-decoration:none">${r.name}</a>` },
            { titulo: 'Família', campo: 'family_name' },
            { titulo: 'Tamanho', campo: 'size' },
            { titulo: 'Armazém', campo: 'warehouse_name' },
            { titulo: 'Distrito', campo: 'warehouse_district' },
            { titulo: 'Quantidade', campo: 'quantity', tipo: 'number' },
          ],
          porPagina: 25,
          pesquisa: true,
          vazio: 'Não há artigos neste estado.'
        });
        tabela.setDados(linhas);
      } catch (e) {
        txt('sub', '');
        txt('err', 'Erro ao carregar: ' + (e && e.message ? e.message : e));
        console.error('Erro em carregar():', e);
      }
    }
    carregar();
    })();
  </script>
</body>
</html>
